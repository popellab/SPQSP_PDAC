name: GPU Tests

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag (e.g. pr-2, latest, or a commit SHA)'
        required: false
        default: 'latest'

# Requires repository secrets:
#   ANVIL_SSH_KEY, ANVIL_USER, ANVIL_HOST, ANVIL_ACCOUNT

jobs:
  test:
    runs-on: ubuntu-22.04
    if: github.repository == 'popellab/SPQSP_PDAC'
    env:
      IMAGE: ghcr.io/${{ github.repository_owner }}/spqsp-pdac-test:${{ inputs.image_tag }}
      REMOTE: ${{ secrets.ANVIL_USER }}@${{ secrets.ANVIL_HOST }}

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ANVIL_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.ANVIL_HOST }} >> ~/.ssh/known_hosts
          cat >> ~/.ssh/config <<SSHEOF
          Host *
            ServerAliveInterval 30
            ServerAliveCountMax 10
          SSHEOF

      - name: Run GPU tests on Anvil
        run: |
          ssh $REMOTE "bash -s" <<EOF
          set -euo pipefail
          SCRATCH=/anvil/scratch/\$USER/pdac_test_${{ github.run_id }}
          mkdir -p \$SCRATCH
          cd \$SCRATCH

          module load apptainer 2>/dev/null || true
          export APPTAINER_DOCKER_USERNAME=${{ github.actor }}
          export APPTAINER_DOCKER_PASSWORD=${{ secrets.GITHUB_TOKEN }}
          apptainer pull --force test.sif docker://$IMAGE
          SIF=\$SCRATCH/test.sif

          git clone --depth 1 --branch ${{ github.ref_name }} \
            https://github.com/${{ github.repository }}.git repo
          TESTS=\$SCRATCH/repo/PDAC/sim/tests

          JOB_ID=\$(sbatch --parsable \
            -A ${{ secrets.ANVIL_ACCOUNT }} \
            -p gpu -N1 --gpus-per-node=1 \
            -t 00:05:00 \
            -o test_output.log \
            --wrap "apptainer run --nv --pwd /sim --bind \$TESTS:/sim/tests \$SIF")

          echo "Submitted job \$JOB_ID, waiting..."

          while squeue -j \$JOB_ID --noheader 2>/dev/null | grep -q .; do
            sleep 15
          done

          STATE=\$(sacct -j \$JOB_ID --format=State --noheader --parsable2 | head -1)
          echo "Job state: \$STATE"
          cat test_output.log
          rm -rf \$SCRATCH

          if [[ "\$STATE" != "COMPLETED" ]]; then
            echo "FAILED: job state was \$STATE"
            exit 1
          fi
          EOF
