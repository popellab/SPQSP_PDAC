name: GPU Tests (Anvil)

on:
  workflow_dispatch:

# Requires:
#   Repository secrets:
#     ANVIL_SSH_KEY     — private key for SSH to Anvil
#     ANVIL_USER        — username (e.g. x-jeliason)
#     ANVIL_HOST        — hostname (e.g. anvil.rcac.purdue.edu)
#     ANVIL_ACCOUNT     — Slurm account (e.g. mth260020-gpu)

jobs:
  test:
    runs-on: ubuntu-22.04
    env:
      IMAGE: ghcr.io/${{ github.repository_owner }}/spqsp-pdac-test:latest
      REMOTE: ${{ secrets.ANVIL_USER }}@${{ secrets.ANVIL_HOST }}

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ANVIL_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.ANVIL_HOST }} >> ~/.ssh/known_hosts

      - name: Submit GPU test job
        run: |
          ssh $REMOTE "bash -s" <<EOF
          set -euo pipefail
          SCRATCH=/anvil/scratch/\$USER/pdac_test_${{ github.run_id }}
          mkdir -p \$SCRATCH
          cd \$SCRATCH

          module load apptainer 2>/dev/null || true
          export APPTAINER_DOCKER_USERNAME=${{ github.actor }}
          export APPTAINER_DOCKER_PASSWORD=${{ secrets.GITHUB_TOKEN }}
          apptainer pull --force test.sif docker://${{ env.IMAGE }}
          SIF=\$SCRATCH/test.sif

          JOB_ID=\$(sbatch --parsable \
            -A ${{ secrets.ANVIL_ACCOUNT }} \
            -p gpu -N1 --gpus-per-node=1 \
            -t 00:15:00 \
            -o test_output.log \
            --wrap "apptainer run --nv --pwd /sim \$SIF")

          echo "Submitted job \$JOB_ID, waiting..."

          while squeue -j \$JOB_ID --noheader 2>/dev/null | grep -q .; do
            sleep 15
          done

          STATE=\$(sacct -j \$JOB_ID --format=State --noheader --parsable2 | head -1)
          echo "Job state: \$STATE"
          cat test_output.log
          rm -rf \$SCRATCH

          if [[ "\$STATE" != "COMPLETED" ]]; then
            echo "FAILED: job state was \$STATE"
            exit 1
          fi
          EOF
