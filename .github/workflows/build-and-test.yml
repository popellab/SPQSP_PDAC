name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/spqsp-pdac-test

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate ODE code from SBML
        run: |
          pip install python-libsbml lxml pytest numpy
          python tools/sbml_converter/convert_sbml.py --fetch --output PDAC/qsp/ode/

      - name: Tier 1 — converter tests
        run: |
          cd tools/sbml_converter
          python -m pytest tests/ -v --ignore=tests/ode_compile_test

      - name: Install Boost (for Tier 2)
        run: sudo apt-get install -y libboost-serialization-dev

      - name: Tier 2 — C++ ODE compile and smoke test
        run: |
          cd tools/sbml_converter/tests/ode_compile_test
          mkdir -p build && cd build
          cmake .. -DPARAM_XML_PATH=${{ github.workspace }}/PDAC/sim/resource/param_all.xml
          cmake --build . -j$(nproc)
          ./ode_compile_test

      - name: Check MATLAB validation stamp
        run: |
          STAMP=tools/sbml_converter/tests/validation_stamp.txt
          if [ ! -f "$STAMP" ]; then
            echo "::error::MATLAB validation stamp missing. Run: tools/sbml_converter/tests/run_validation.sh"
            exit 1
          fi
          STAMP_SHA=$(cut -d' ' -f1 "$STAMP")
          HEAD_SHA=$(git rev-parse HEAD)
          if [ "$STAMP_SHA" != "$HEAD_SHA" ]; then
            echo "::warning::Validation stamp is from $STAMP_SHA, HEAD is $HEAD_SHA. Re-run: tools/sbml_converter/tests/run_validation.sh"
          fi

      - name: Compute image tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "tag=pr-${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.test
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

  gpu-test:
    needs: build
    runs-on: ubuntu-22.04
    if: github.repository == 'popellab/SPQSP_PDAC'
    env:
      IMAGE: ghcr.io/${{ github.repository_owner }}/spqsp-pdac-test:${{ github.sha }}
      REMOTE: ${{ secrets.ANVIL_USER }}@${{ secrets.ANVIL_HOST }}

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ANVIL_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.ANVIL_HOST }} >> ~/.ssh/known_hosts
          cat >> ~/.ssh/config <<SSHEOF
          Host *
            ServerAliveInterval 30
            ServerAliveCountMax 10
          SSHEOF

      - name: Run GPU tests on Anvil
        run: |
          ssh $REMOTE "bash -s" <<EOF
          set -euo pipefail
          SCRATCH=/anvil/scratch/\$USER/pdac_test_${{ github.run_id }}
          mkdir -p \$SCRATCH
          cd \$SCRATCH

          module load apptainer 2>/dev/null || true
          export APPTAINER_DOCKER_USERNAME=${{ github.actor }}
          export APPTAINER_DOCKER_PASSWORD=${{ secrets.GITHUB_TOKEN }}
          apptainer pull --force test.sif docker://$IMAGE
          SIF=\$SCRATCH/test.sif

          git clone --depth 1 --branch ${{ github.head_ref || github.ref_name }} \
            https://github.com/${{ github.repository }}.git repo
          TESTS=\$SCRATCH/repo/PDAC/sim/tests

          JOB_ID=\$(sbatch --parsable \
            -A ${{ secrets.ANVIL_ACCOUNT }} \
            -p gpu -N1 --gpus-per-node=1 \
            -t 00:05:00 \
            -o test_output.log \
            --wrap "apptainer run --nv --pwd /sim --bind \$TESTS:/sim/tests \$SIF")

          echo "Submitted job \$JOB_ID, waiting..."

          while squeue -j \$JOB_ID --noheader 2>/dev/null | grep -q .; do
            sleep 15
          done

          STATE=\$(sacct -j \$JOB_ID --format=State --noheader --parsable2 | head -1)
          echo "Job state: \$STATE"
          cat test_output.log
          rm -rf \$SCRATCH

          if [[ "\$STATE" != "COMPLETED" ]]; then
            echo "FAILED: job state was \$STATE"
            exit 1
          fi
          EOF
